aid: disqus
name: Disqus
description: >-
  Disqus is a hosted web comments and community discussion service used by
  publishers and bloggers to add threaded commenting, social sharing, and
  audience engagement features to their sites without running their own
  backend. The Disqus Public API lets developers read and write comments,
  threads, forums, users, and category data and integrate Disqus communities
  into custom applications. Authentication uses OAuth 2.0 plus an API key
  and secret, with all REST endpoints served from disqus.com/api/3.0/.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
