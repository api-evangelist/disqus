created: '2026-05-11'
modified: '2026-05-11'
specificationVersion: '0.19'
apis:
  - aid: disqus:public-api
    name: Disqus Public API
    description: >-
      REST API for reading and writing Disqus comments, threads, forums,
      users, categories, and moderation data. Endpoints are served from
      https://disqus.com/api/3.0/ and authenticated via OAuth 2.0 access
      tokens combined with an application API key and secret passed as
      query parameters.
    humanURL: https://disqus.com/api/docs/
    baseURL: https://disqus.com/api/3.0/
    tags:
      - Comments
      - Threads
      - Forums
      - Users
      - Categories
      - Moderation
    properties:
